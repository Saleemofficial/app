apiVersion:  apps/v1
kind:  Deployment
metadata:
  name:  todapp

spec:
  replicas:  2
  selector:
    matchLabels:
      app:  todapp

  template:
    metadata:
      labels:
        app:  todapp

    spec:
      containers:
      - name:  tod-app
        image:  saleem030896/todapp:latest
        ports:
        - containerPort:  5009



